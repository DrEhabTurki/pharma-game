<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>محاكي التدريب الصيدلاني (MediHeal)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="public/doctor.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Category Selection Screen -->
        <div id="categories-screen" class="screen active">
            <div class="logo-container">
                <img src="public/doctor.png" alt="Doctor" class="doctor-img" style="width: 100px; height: 100px;">
                <h1 style="font-size: 2rem; margin-top: 10px;">MediHeal Pro</h1>
            </div>
            <h2><i class="fas fa-layer-group"></i> اختر قسم التدريب</h2>
            <div class="categories-grid" id="categories-grid">
                <!-- Categories injected via JS -->
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="top-bar glass">
                <div class="score-board"><i class="fas fa-star text-gold"></i> النقاط: <span id="score">0</span></div>
                <div class="category-badge" id="current-category-badge">الجهاز الهضمي</div>
            </div>
            
            <div class="patient-area">
                <div class="patient-profile glass">
                    <img src="public/patient.png" alt="Patient" class="patient-img" id="patient-img">
                    <div class="patient-info">
                        <h3 id="patient-name">مريض #001</h3>
                        <p class="severity-badge" id="severity-badge">حالة حرجة</p>
                    </div>
                </div>
                
                <div class="bubble glass-dark" id="symptom-bubble">
                    <i class="fas fa-quote-right quote-icon"></i>
                    <p id="symptom-text">جاري تحميل الحالة...</p>
                </div>
            </div>

            <div class="medicine-cabinet glass-heavy">
                <div class="cabinet-header">
                    <h3><i class="fas fa-pills"></i> اختر المادة الفعالة الصحيحة</h3>
                </div>
                <div class="medicines-grid" id="medicines-grid">
                    <!-- Medicine items will be injected here -->
                </div>
            </div>
        </div>

        <!-- Explanation Modal -->
        <div id="explanation-modal" class="modal-overlay">
            <div class="modal-content glass-heavy">
                <div class="modal-header" id="modal-header">
                    <i class="fas fa-check-circle" id="modal-icon"></i>
                    <h2 id="modal-title">إجابة صحيحة</h2>
                </div>
                <div class="modal-body">
                    <h3 class="modal-med-name" id="modal-med-name">Omeprazole</h3>
                    <p class="modal-brand" id="modal-brand"><i class="fas fa-tags"></i> الاسم التجاري: Losec</p>
                    <hr class="modal-divider">
                    <p id="modal-text">شرح الدواء...</p>
                </div>
                <button id="next-btn" class="btn premium-btn">الحالة التالية <i class="fas fa-arrow-left"></i></button>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(
            () => console.log('ServiceWorker registration successful'),
            err => console.log('ServiceWorker registration failed', err)
          );
        });
      }
    </script>
</body>
</html>
